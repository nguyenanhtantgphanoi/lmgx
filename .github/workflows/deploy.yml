name: Deploy to Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Package release
        run: |
          tar --exclude=".git" --exclude="node_modules" -czf release.tar.gz .

      - name: Upload release to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "release.tar.gz"
          target: "/var/www/lmgx"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: GITHUB_SHA
          script: |
            set -e
            APP_ROOT=/var/www/lmgx
            RELEASE_DIR=$APP_ROOT/releases/$GITHUB_SHA
            mkdir -p $RELEASE_DIR
            tar -xzf $APP_ROOT/release.tar.gz -C $RELEASE_DIR
            rm -f $APP_ROOT/release.tar.gz

            cd $RELEASE_DIR
            npm ci --omit=dev

            mkdir -p $RELEASE_DIR/public
            rm -rf $RELEASE_DIR/public/uploads
            ln -sfn $APP_ROOT/shared/public/uploads $RELEASE_DIR/public/uploads
            ln -sfn $APP_ROOT/shared/.env $RELEASE_DIR/.env

            ln -sfn $RELEASE_DIR $APP_ROOT/current

            pm2 startOrReload $APP_ROOT/shared/ecosystem.config.cjs --update-env
            pm2 save